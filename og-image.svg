<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="63" cy="57" r="43" fill="#4338ca" opacity="0.19"/>
    <circle cx="422" cy="308" r="40" fill="#4338ca" opacity="0.17"/>
    <circle cx="731" cy="645" r="83" fill="#4338ca" opacity="0.19"/>
    <circle cx="516" cy="38" r="38" fill="#4338ca" opacity="0.20"/>
    <circle cx="399" cy="273" r="33" fill="#4338ca" opacity="0.19"/>
    <circle cx="489" cy="376" r="55" fill="#4338ca" opacity="0.15"/>
    <rect x="149" y="406" width="54" height="84" rx="8" fill="#4f46e5" opacity="0.14" transform="rotate(23, 916, 16)"/>
    <rect x="642" y="8" width="83" height="68" rx="8" fill="#4f46e5" opacity="0.12" transform="rotate(18, 706, 521)"/>
    <rect x="1085" y="293" width="20" height="34" rx="8" fill="#4f46e5" opacity="0.13" transform="rotate(32, 1226, 699)"/>
    <rect x="484" y="298" width="69" height="96" rx="8" fill="#4f46e5" opacity="0.12" transform="rotate(17, 609, 204)"/>
    <rect x="507" y="142" width="36" height="82" rx="8" fill="#4f46e5" opacity="0.13" transform="rotate(28, 616, 268)"/>
    <rect x="1089" y="709" width="69" height="54" rx="8" fill="#4f46e5" opacity="0.11" transform="rotate(22, -8, 522)"/>
    <rect x="318" y="400" width="28" height="94" rx="8" fill="#4f46e5" opacity="0.07" transform="rotate(26, 821, 544)"/>
    <rect x="1077" y="157" width="51" height="94" rx="8" fill="#4f46e5" opacity="0.10" transform="rotate(33, 15, -69)"/>
    <polygon points="1064,198 1108,286 1020,286" fill="#4338ca" opacity="0.03"/>
    <polygon points="1291,215 1357,347 1225,347" fill="#4338ca" opacity="0.10"/>
    <polygon points="652,332 682,392 622,392" fill="#4338ca" opacity="0.04"/>
    <polygon points="895,-162 985,18 805,18" fill="#4338ca" opacity="0.04"/>

  <!-- Wave at bottom -->
  <path d="M0,588 C360,609 840,567 1200,588 L1200,630 L0,630Z" fill="#4338ca" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    구글 알고리즘 감점 치료 및 백링크 수술실
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
     — 검색엔진 응급수술
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#818cf8" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#818cf8" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
     구글 알고리즘 감점 치료 및 백링크 수술실 — 검색엔진 응급수술
  </text>
</svg>