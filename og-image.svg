<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="762" cy="398" r="79" fill="#f57c00" opacity="0.15"/>
    <circle cx="952" cy="283" r="74" fill="#f57c00" opacity="0.17"/>
    <circle cx="1107" cy="-63" r="27" fill="#f57c00" opacity="0.09"/>
    <circle cx="-20" cy="-77" r="89" fill="#f57c00" opacity="0.08"/>
    <circle cx="661" cy="444" r="76" fill="#f57c00" opacity="0.09"/>
    <circle cx="393" cy="-48" r="86" fill="#f57c00" opacity="0.11"/>
    <rect x="151" y="496" width="65" height="76" rx="8" fill="#e65100" opacity="0.07" transform="rotate(27, 567, 209)"/>
    <rect x="412" y="214" width="60" height="70" rx="8" fill="#e65100" opacity="0.06" transform="rotate(7, 833, 462)"/>
    <rect x="664" y="345" width="47" height="38" rx="8" fill="#e65100" opacity="0.07" transform="rotate(1, 926, 638)"/>
    <rect x="230" y="-36" width="31" height="85" rx="8" fill="#e65100" opacity="0.08" transform="rotate(21, 136, 54)"/>
    <rect x="389" y="29" width="32" height="87" rx="8" fill="#e65100" opacity="0.09" transform="rotate(22, 883, 268)"/>
    <rect x="831" y="607" width="94" height="95" rx="8" fill="#e65100" opacity="0.14" transform="rotate(23, 60, -9)"/>
    <rect x="640" y="393" width="58" height="40" rx="8" fill="#e65100" opacity="0.11" transform="rotate(33, 287, 623)"/>
    <rect x="348" y="607" width="85" height="63" rx="8" fill="#e65100" opacity="0.03" transform="rotate(8, 1199, 360)"/>
    <polygon points="68,286 167,484 -31,484" fill="#f57c00" opacity="0.10"/>
    <polygon points="238,385 331,571 145,571" fill="#f57c00" opacity="0.11"/>
    <polygon points="534,692 560,744 508,744" fill="#f57c00" opacity="0.04"/>
    <polygon points="716,280 780,408 652,408" fill="#f57c00" opacity="0.07"/>

  <!-- Wave at bottom -->
  <path d="M0,582 C360,606 840,558 1200,582 L1200,630 L0,630Z" fill="#f57c00" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    구글 알고리즘 감점 치료 및 백링크 수술실
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
     — 검색엔진 응급수술
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffcc80" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffcc80" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
     구글 알고리즘 감점 치료 및 백링크 수술실 — 검색엔진 응급수술
  </text>
</svg>